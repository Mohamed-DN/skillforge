name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api-gateway
          - services/auth-service
          - services/billing-service
          - services/chat-service
          - services/llm-gateway
          - services/ai-worker
          - services/user-intelligence-worker
          - services/assessment-engine
          - services/user-profile-service
          - services/cv-analyzer
          - services/notification-service
          - services/career-advisor-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff black isort
      - name: Lint with Ruff
        run: ruff check ${{ matrix.service }}/src/ || true
      - name: Check formatting with Black
        run: black --check ${{ matrix.service }}/src/ || true
      - name: Check imports with isort
        run: isort --check-only ${{ matrix.service }}/src/ || true

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: skillforge_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api-gateway
          - services/auth-service
          - services/billing-service
          - services/llm-gateway
          - services/ai-worker
          - services/assessment-engine
          - services/user-profile-service
          - services/cv-analyzer
          - services/notification-service
          - services/career-advisor-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          if [ -f ${{ matrix.service }}/requirements.txt ]; then
            pip install -r ${{ matrix.service }}/requirements.txt
          fi
          pip install pytest pytest-cov pytest-asyncio
      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/skillforge_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          TEST_DIR="${{ matrix.service }}/tests"
          # Only run pytest if there are actual test files (not just __init__.py)
          TEST_FILES=$(find "$TEST_DIR" -name "test_*.py" -o -name "*_test.py" 2>/dev/null | head -1)
          if [ -n "$TEST_FILES" ]; then
            pytest "$TEST_DIR" -v --cov=${{ matrix.service }}/src/
          else
            echo "⏭️  No test files found in $TEST_DIR — skipping"
          fi

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            containerfile: Containerfile.python-service
          - service: auth-service
            containerfile: Containerfile.python-service
          - service: billing-service
            containerfile: Containerfile.python-service
          - service: chat-service
            containerfile: Containerfile.python-service
          - service: llm-gateway
            containerfile: Containerfile.python-service
          - service: ai-worker
            containerfile: Containerfile.python-worker
          - service: user-intelligence-worker
            containerfile: Containerfile.python-worker
          - service: assessment-engine
            containerfile: Containerfile.python-service
          - service: user-profile-service
            containerfile: Containerfile.python-service
          - service: cv-analyzer
            containerfile: Containerfile.python-worker
          - service: notification-service
            containerfile: Containerfile.python-service
          - service: career-advisor-service
            containerfile: Containerfile.python-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build container image
        run: |
          docker build -f infra/containers/${{ matrix.containerfile }} \
            -t ghcr.io/mohamed-dn/skillforge-${{ matrix.service }}:${{ github.sha }} \
            -t ghcr.io/mohamed-dn/skillforge-${{ matrix.service }}:latest \
            services/${{ matrix.service }}/
