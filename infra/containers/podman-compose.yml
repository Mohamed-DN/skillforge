# ============================================================
# SkillForge — Local Development Stack (Podman Compose)
# ============================================================
# Usage: podman-compose -f infra/containers/podman-compose.yml up -d
# ============================================================

version: "3.9"

services:
  # ── Database ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: skillforge-postgres
    environment:
      POSTGRES_DB: skillforge
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge_dev_CHANGE_ME
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Enable pgvector extension ────────────────────────────
  postgres-init:
    image: timescale/timescaledb:latest-pg16
    container_name: skillforge-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "PGPASSWORD=skillforge_dev_CHANGE_ME psql -h postgres -U skillforge -d skillforge -c 'CREATE EXTENSION IF NOT EXISTS vector;'"
    restart: "no"

  # ── Redis (Sessions + Cache) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: skillforge-redis
    command: redis-server --requirepass skillforge_redis_CHANGE_ME --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "skillforge_redis_CHANGE_ME", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Event Bus (Redpanda) ─────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: skillforge-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # ── Redpanda Console (UI) ───────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: skillforge-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
    ports:
      - "8080:8080"

  # ── Object Storage (MinIO — S3-compatible) ──────────────
  minio:
    image: minio/minio:latest
    container_name: skillforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: skillforge
      MINIO_ROOT_PASSWORD: skillforge_minio_CHANGE_ME
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  minio_data:
